services:
  encounter-tracker:
    image: ghcr.io/zachauker/5e-campaign-hub:latest
    container_name: encounter-tracker
    ports:
      - "7542:3000"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/encounter-tracker.db
      # Reference-library embedding model, mounted from the /data volume (not baked into
      # the image). Fetch it onto the host at ./data/reference-models — see reference-data/DEPLOY.md.
      - REFERENCE_MODEL_DIR=/data/reference-models
    labels:
      - "net.unraid.docker.icon=https://img.icons8.com/?size=100&id=vcao1uuXchDQ&format=png&color=000000"
    networks:
      - oakwoodproxy
    restart: unless-stopped

networks:
  oakwoodproxy:
    external: true
