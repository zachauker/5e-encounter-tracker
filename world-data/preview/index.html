<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exandria preview</title>
  <link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html,body,#map{margin:0;height:100%}
    #theme{position:absolute;top:10px;left:10px;z-index:1;padding:6px 8px;border-radius:6px;
      border:1px solid #0003;background:#fff;font:13px system-ui;box-shadow:0 1px 4px #0003}
  </style>
</head>
<body>
  <select id="theme" title="Map theme"></select>
  <div id="map"></div>
  <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@4/dist/pmtiles.js"></script>
  <script>
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);
    const origin = location.origin; // node server serves world-data/ as root
    const STYLES = "../build/styles"; // generated by scripts/world/build-themes.js

    // Point a fetched style at the locally-served pmtiles + glyphs (absolute URLs).
    function fixup(style) {
      style.sources.exandria.url = "pmtiles://" + origin + "/build/exandria.pmtiles";
      style.glyphs = origin + "/build/glyphs/{fontstack}/{range}.pbf";
      return style;
    }
    const loadStyle = (id) => fetch(`${STYLES}/${id}.json`).then((r) => r.json()).then(fixup);

    let map;
    fetch(`${STYLES}/themes.json`)
      .then((r) => r.json())
      .then(async ({ themes }) => {
        const sel = document.getElementById("theme");
        themes.forEach((t) => {
          const o = document.createElement("option");
          o.value = t.id;
          o.textContent = t.label;
          if (t.default) o.selected = true;
          sel.appendChild(o);
        });
        const defaultId = (themes.find((t) => t.default) || themes[0]).id;
        const style = await loadStyle(defaultId);
        map = new maplibregl.Map({
          container: "map",
          style,
          center: [11.806, 5.193],
          zoom: 4,
          minZoom: 3,
          maxZoom: 12,
        });
        map.addControl(new maplibregl.NavigationControl());
        map.on("error", (e) => console.error("map error:", e.error));
        window.__map = map; // debug/tuning hook
        sel.addEventListener("change", async (e) => {
          map.setStyle(await loadStyle(e.target.value)); // preserves camera
        });
      })
      .catch((e) => console.error("theme load failed:", e));
  </script>
</body>
</html>
